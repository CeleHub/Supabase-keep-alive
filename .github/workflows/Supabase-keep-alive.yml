name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      # ✅ FIXED: Pass secrets into script via env
      - name: Run Keep Alive Script
        id: run
        env:
          PROJECTS_CONFIG: ${{ secrets.PROJECTS_CONFIG }}
        run: bash scripts/ping.sh

      - name: Write GitHub Summary
        run: |
          echo "${{ steps.run.outputs.summary }}" >> $GITHUB_STEP_SUMMARY

      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="${{ steps.run.outputs.telegram_message }}"