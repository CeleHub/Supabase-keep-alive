name: Keep Supabase Alive

on:
  schedule:
    # Every day at 00:00 UTC
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  ping-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Parse projects and ping them
        run: |

          echo "=================================="
          echo "SUPABASE KEEP-ALIVE STARTED"
          echo "=================================="

          echo '${{ secrets.PROJECTS_CONFIG }}' |
          jq -c '.[]' |
          while read project; do

            NAME=$(echo "$project" | jq -r '.name')
            URL=$(echo "$project" | jq -r '.url')
            APIKEY=$(echo "$project" | jq -r '.apikey')
            TABLE=$(echo "$project" | jq -r '.table')

            echo ""
            echo "🔍 Pinging $NAME..."

            if curl \
              --silent \
              --show-error \
              --fail \
              "$URL/rest/v1/$TABLE?select=id&limit=1" \
              -H "apikey: $APIKEY" \
              -H "Authorization: Bearer $APIKEY" \
              -H "Content-Type: application/json"
            then
              echo "✅ SUCCESS: $NAME"
            else
              echo "❌ FAILED: $NAME"
            fi

          done

          echo ""
          echo "=================================="
          echo "KEEP-ALIVE FINISHED"
          echo "=================================="